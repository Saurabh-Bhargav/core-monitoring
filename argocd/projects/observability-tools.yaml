apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability-tools
  namespace: argocd
spec:
  description: GitOps project for observability

  sourceRepos:
    - '*'

  destinations:
    - namespace: '*'
      server: https://kubernetes.default.svc

  clusterResourceWhitelist:
    - group: '*'
      kind: '*'

  namespaceResourceWhitelist:
    - group: '*'
      kind: '*'