apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: observability-bootstrap
  namespace: argocd
spec:
  project: observability-tools
  source:
    repoURL: https://github.com/<ORG>/<REPO>.git
    targetRevision: main
    path: argocd/bootstrap
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
