apiVersion: argoproj.io/v1alpha1
kind: AppProject
metadata:
  name: observability-tools
  namespace: argocd
  annotations:
    argocd.argoproj.io/sync-wave: "0"
spec:
  description: GitOps project for the observability platform
  sourceRepos:
    - https://github.com/<ORG>/<REPO>.git
    - https://prometheus-community.github.io/helm-charts
    - https://grafana-community.github.io/helm-charts
  destinations:
    - server: https://kubernetes.default.svc
      namespace: argocd
    - server: https://kubernetes.default.svc
      namespace: monitoring
    - server: https://kubernetes.default.svc
      namespace: logging
    - server: https://kubernetes.default.svc
      namespace: grafana
  clusterResourceWhitelist:
    - group: ""
      kind: Namespace
  namespaceResourceWhitelist:
    - group: ""
      kind: ConfigMap
    - group: ""
      kind: Secret
    - group: ""
      kind: Service
    - group: ""
      kind: ServiceAccount
    - group: ""
      kind: PersistentVolumeClaim
    - group: ""
      kind: Pod
    - group: ""
      kind: Endpoints
    - group: ""
      kind: Event
    - group: "monitoring.coreos.com"
      kind: PrometheusRule
    - group: "monitoring.coreos.com"
      kind: ServiceMonitor
    - group: "monitoring.coreos.com"
      kind: PodMonitor
